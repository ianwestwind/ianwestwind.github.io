<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Portfolio · WINN Platforms</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />

</head>

      <div class="nav-links">
        <a href="index.html">About</a>
        <a href="portfolio-software.html">Software</a>

        <a href="forum.html">WINNers</a>

        <a href="news.html">News</a>
        <div class="nav-dropdown" data-nav-key="teaching">
          <button class="nav-dropdown-btn" onclick="this.closest('.nav-dropdown').classList.toggle('open')">Teaching <span class="nav-dropdown-chevron">▾</span></button>
          <div class="nav-dropdown-menu">
            <a href="teaching/bayesian-thinking.html" target="_blank">Bayesian Thinking</a>
            <a href="#">Intro to Python</a>
          </div>
        </div>
        <a href="consultation.html">Consultation</a>
      </div>
    </aside>
    <main class="main-content">
  <div class="page-wrapper">
    <div class="page-title-bar">
      <div class="container">
        <h1>Design Portfolio</h1>
        <p>UI/UX, branding, and visual design work</p>
      </div>
    </div>

    <section class="section-sm container">
      <!-- List header (admin only) -->
      <div class="list-header" id="design-list-header" style="display:none">
        <span id="design-count" class="list-header-count"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="design-toggle-form-btn">+ New Project</button>
      </div>

      <!-- Add / Edit project form (admin only, collapsed by default) -->
      <div id="design-project-form-wrap" class="post-form" style="display:none">
        <h3 id="design-form-heading">New design project</h3>
        <form id="design-project-form">
          <div class="form-group">
            <label for="design-tag-input">Tag</label>
            <input type="text" id="design-tag-input" name="tag" list="design-tags-datalist"
              placeholder="e.g. ui, brand, illustration…" required autocomplete="off" />
            <datalist id="design-tags-datalist">
              <option value="ui">
              <option value="brand">
              <option value="illustration">
              <option value="motion">
            </datalist>
          </div>
          <div class="form-group">
            <label for="design-title">Title</label>
            <input type="text" id="design-title" name="title" placeholder="Project name" required />
          </div>
          <div class="form-group">
            <label for="design-desc">Description <span style="color:var(--text-muted)">(short summary shown on card)</span></label>
            <textarea id="design-desc" name="description" placeholder="Brief description" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Body <span style="color:var(--text-muted)">(optional — rich text, images, case study)</span></label>
            <div class="editor-wrapper">
              <div id="ds-toolbar">
                <span class="ql-formats">
                  <select class="ql-header">
                    <option value="2">H2</option>
                    <option value="3">H3</option>
                    <option selected>Body</option>
                  </select>
                </span>
                <span class="ql-formats">
                  <button class="ql-bold"></button>
                  <button class="ql-italic"></button>
                  <button class="ql-underline"></button>
                </span>
                <span class="ql-formats">
                  <button class="ql-list" value="ordered"></button>
                  <button class="ql-list" value="bullet"></button>
                </span>
                <span class="ql-formats">
                  <button class="ql-blockquote"></button>
                </span>
                <span class="ql-formats">
                  <button class="ql-link"></button>
                  <button class="ql-image" title="Insert Image"></button>
                </span>
                <span class="ql-formats">
                  <button class="ql-clean"></button>
                </span>
              </div>
              <div id="ds-editor" class="editor-content"></div>
            </div>
          </div>
          <div class="form-group">
            <label>Thumbnail <span style="color:var(--text-muted)">(optional, max 10 MB)</span></label>
            <label class="file-input-label">
              Upload thumbnail
              <input type="file" id="ds-thumb" accept="image/*" />
            </label>
            <div id="ds-thumb-preview"></div>
          </div>
          <div class="form-group">
            <label>Attachments <span style="color:var(--text-muted)">(any type, max 25 MB each)</span></label>
            <label class="file-input-label">
              Add files
              <input type="file" id="ds-attach-input" multiple />
            </label>
            <div id="ds-attach-list" class="attach-list"></div>
          </div>
          <div class="form-group">
            <label>Links <span style="color:var(--text-muted)">(optional — add as many as needed)</span></label>
            <div id="ds-links-container"></div>
            <button type="button" class="btn btn-ghost btn-sm" id="ds-add-link-btn" style="margin-top:0.5rem">+ Add Link</button>
          </div>
          <p class="form-error" id="design-form-error"></p>
          <div style="display:flex;gap:0.5rem;align-items:center">
            <button type="submit" class="btn btn-primary btn-sm" id="design-submit-btn">Add project</button>
            <button type="button" class="btn btn-ghost btn-sm" id="design-cancel-btn">Cancel</button>
          </div>
        </form>
      </div>

      <!-- Filter chips (dynamic) -->
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem;" id="filter-bar">
        <button class="btn btn-secondary btn-sm active-filter" data-filter="all">All</button>
      </div>

      <div class="card-grid" id="design-grid"></div>
    </section>
  </div>
  </main>

  <aside class="sidebar-user">
    <div class="nav-user" id="nav-user" style="display:none"></div>
    <a href="login.html" class="btn btn-primary btn-sm" id="nav-login">Sign In</a>
    <button class="btn btn-ghost btn-sm" id="nav-logout" style="display:none">Sign Out</button>
  </aside>
  <aside class="sidebar-controls">
    <div class="controls-group">
      <span class="controls-group-label">Theme</span>
      <div class="controls-theme">
        <button type="button" id="theme-light">Light</button>
        <button type="button" id="theme-dark">Dark</button>
      </div>
    </div>
    <div class="controls-group">
      <span class="controls-group-label">Font</span>
      <div class="controls-font">
        <button type="button" class="font-option" data-font="inter" aria-label="Inter">Aa</button>
        <button type="button" class="font-option" data-font="georgia" aria-label="Georgia">Aa</button>
        <button type="button" class="font-option" data-font="system" aria-label="System">Aa</button>
      </div>
    </div>
    <div class="controls-group">
      <span class="controls-group-label">Size</span>
      <div class="controls-font-size">
        <button type="button" class="font-size-option" data-size="s">S</button>
        <button type="button" class="font-size-option" data-size="m">M</button>
        <button type="button" class="font-size-option" data-size="l">L</button>
      </div>
    </div>
  </aside>
  </div>

  <footer class="footer">
    <div class="container"><p>© 2026 WINN Platforms</p></div>
  </footer>

  <!-- Project detail modal -->
  <div id="portfolio-modal" class="portfolio-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-title-el">
    <div class="portfolio-modal-backdrop" id="modal-backdrop"></div>
    <div class="portfolio-modal-box">
      <div class="portfolio-modal-header">
        <button class="portfolio-modal-close-btn" id="portfolio-modal-close">✕ Close</button>
      </div>
      <div id="portfolio-modal-content"></div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./js/firebase-config.js";
    import { initAuth, updateNavUI, logout, showToast, hasRole } from "./js/auth.js?v=3";
    import { initLayoutControls } from "./js/layout-controls.js";
    import {
      collection, getDocs, addDoc, doc, updateDoc, deleteDoc,
      serverTimestamp, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { initEditor, getEditorHTML, initThumbnailZone, initAttachmentZone, renderBody, highlightContent }
      from "./js/editor.js";
    import { logVisit, showStats } from "./js/analytics.js";
    import { initNavVisibility } from "./js/nav-visibility.js";

    initLayoutControls();
    logVisit("design");

    const GRID_ID      = "design-grid";
    const COUNT_ID     = "design-count";
    const FORM_WRAP_ID = "design-project-form-wrap";
    const FORM_ID      = "design-project-form";
    const DS_LABELS    = { ui: "UI/UX", brand: "Branding", illustration: "Illustration", motion: "Motion" };

    let _dsQuill = null, _dsThumbZone = null, _dsAttachZone = null;
    let _editorInited = false;
    let _editId       = null;
    let _currentRole  = "guest";
    const _allTags    = new Set();
    const _projects   = new Map();

    // ---- Helpers ----
    function esc(s) {
      if (!s) return "";
      const d = document.createElement("div"); d.textContent = s; return d.innerHTML;
    }

    function _tagLabel(t) {
      return DS_LABELS[t] || (t ? t.charAt(0).toUpperCase() + t.slice(1) : "");
    }

    function _populateTagDatalist() {
      const dl = document.getElementById("design-tags-datalist");
      if (!dl) return;
      const existing = new Set([...dl.querySelectorAll("option")].map(o => o.value));
      _allTags.forEach(t => {
        if (!existing.has(t)) { const opt = document.createElement("option"); opt.value = t; dl.appendChild(opt); }
      });
    }

    function _buildFilterBar() {
      const bar    = document.getElementById("filter-bar");
      const active = bar.querySelector(".active-filter")?.dataset.filter || "all";
      bar.innerHTML = "";
      const allBtn = document.createElement("button");
      allBtn.className = "btn btn-secondary btn-sm" + (active === "all" ? " active-filter" : "");
      allBtn.dataset.filter = "all"; allBtn.textContent = "All";
      bar.appendChild(allBtn);
      [..._allTags].sort().forEach(t => {
        const btn = document.createElement("button");
        btn.className = "btn btn-secondary btn-sm" + (active === t ? " active-filter" : "");
        btn.dataset.filter = t; btn.textContent = _tagLabel(t);
        bar.appendChild(btn);
      });
    }

    function _addLinkRow(container, url = "", label = "") {
      const row = document.createElement("div");
      row.className = "link-row";
      row.innerHTML = `
        <input type="url"  class="link-url"   placeholder="https://..." />
        <input type="text" class="link-label" placeholder="Label (e.g. Figma)" />
        <button type="button" class="btn btn-ghost btn-sm remove-link-btn">✕</button>
      `;
      row.querySelector(".link-url").value   = url;
      row.querySelector(".link-label").value = label;
      row.querySelector(".remove-link-btn").addEventListener("click", () => row.remove());
      container.appendChild(row);
    }

    function _getLinks() {
      return [...document.querySelectorAll("#ds-links-container .link-row")].reduce((acc, row) => {
        const url = row.querySelector(".link-url")?.value.trim();
        const label = row.querySelector(".link-label")?.value.trim();
        if (url) acc.push({ url, label: label || "View" });
        return acc;
      }, []);
    }

    function _resolveLinks(d) {
      return Array.isArray(d.links) ? d.links
        : (d.linkUrl ? [{ url: d.linkUrl, label: d.linkLabel || "View" }] : []);
    }

    // ---- Card renderer ----
    function renderDesignCard(docSnap) {
      const d  = docSnap.data();
      const id = docSnap.id;
      _projects.set(id, d);

      const tag   = d.tag || "ui";
      const links = _resolveLinks(d);
      const card  = document.createElement("div");
      card.className = "card card-clickable";
      card.dataset.tags  = tag;
      card.dataset.docId = id;

      // Thumbnail as 50% transparent background
      if (d.thumbnailUrl) {
        card.classList.add("has-thumb");
        card.style.backgroundImage = `url('${d.thumbnailUrl.replace(/'/g, "\\'")}')`;
      }

      const linksHtml = links.map(l =>
        `<a href="${esc(l.url)}" class="btn btn-secondary btn-sm" target="_blank" rel="noopener">${esc(l.label || "View")}</a>`
      ).join("");

      card.innerHTML = `
        <div class="card-tag">${esc(_tagLabel(tag))}</div>
        <h3>${esc(d.title || "Project")}</h3>
        <p>${esc(d.description || "")}</p>
        <div class="card-links">${linksHtml}</div>
      `;

      card.addEventListener("click", (e) => {
        if (e.target.closest("a")) return;
        _openModal(id);
      });

      return card;
    }

    // ---- Load projects ----
    async function loadDesignProjects() {
      const grid    = document.getElementById(GRID_ID);
      const countEl = document.getElementById(COUNT_ID);
      try {
        const snap = await getDocs(query(collection(db, "design_projects"), orderBy("createdAt", "desc")));
        grid.querySelectorAll(".card[data-doc-id]").forEach(c => c.remove());
        _projects.clear();
        snap.docs.forEach(docSnap => {
          const tag = docSnap.data().tag;
          if (tag) _allTags.add(tag);
          grid.insertBefore(renderDesignCard(docSnap), grid.firstChild);
        });
        _buildFilterBar();
        _populateTagDatalist();
        if (countEl) countEl.textContent = grid.querySelectorAll(".card").length + " projects";
      } catch (e) { console.warn("loadDesignProjects", e); }
    }

    // ---- Modal ----
    function _openModal(id) {
      const d = _projects.get(id);
      if (!d) return;

      const isAdmin     = hasRole(_currentRole, "admin");
      const links       = _resolveLinks(d);
      const attachments = Array.isArray(d.attachments) ? d.attachments : [];
      const content     = document.getElementById("portfolio-modal-content");

      content.innerHTML = `
        ${d.thumbnailUrl ? `<img src="${esc(d.thumbnailUrl)}" alt="" class="portfolio-modal-thumb" />` : ""}
        <div class="portfolio-modal-tag">${esc(_tagLabel(d.tag))}</div>
        <h2 class="portfolio-modal-title" id="modal-title-el">${esc(d.title || "Project")}</h2>
        ${d.description ? `<p class="portfolio-modal-desc">${esc(d.description)}</p>` : ""}
        ${d.body ? `<div class="portfolio-modal-body-content rich-content" id="modal-body-ds"></div>` : ""}
        ${links.length ? `
          <div class="portfolio-modal-links">
            ${links.map(l => `<a href="${esc(l.url)}" class="btn btn-secondary btn-sm" target="_blank" rel="noopener">${esc(l.label || "View")}</a>`).join("")}
          </div>` : ""}
        ${attachments.length ? `
          <div class="portfolio-modal-attachments">
            <div class="attach-section-title">Attachments</div>
            ${attachments.map(a => `
              <div class="attach-item">
                <a href="${esc(a.url)}" target="_blank" rel="noopener" class="attach-link">${esc(a.name)}</a>
                <span class="attach-size">${Math.round((a.size || 0) / 1024)} KB</span>
              </div>`).join("")}
          </div>` : ""}
        ${isAdmin ? `
          <div class="portfolio-modal-actions">
            <button class="btn btn-primary btn-sm" id="modal-edit-btn">Edit</button>
            <button class="btn btn-danger btn-sm"  id="modal-delete-btn">Delete</button>
          </div>` : ""}
      `;

      if (d.body) {
        const bodyEl = document.getElementById("modal-body-ds");
        if (bodyEl) { bodyEl.innerHTML = renderBody(d.body); highlightContent(bodyEl); }
      }

      document.getElementById("modal-edit-btn")?.addEventListener("click",   () => { _closeModal(); _startEdit(id); });
      document.getElementById("modal-delete-btn")?.addEventListener("click", () => _deleteProject(id));

      document.getElementById("portfolio-modal").style.display = "";
      document.body.style.overflow = "hidden";
    }

    function _closeModal() {
      document.getElementById("portfolio-modal").style.display = "none";
      document.body.style.overflow = "";
    }

    // ---- Edit ----
    function _startEdit(id) {
      const d = _projects.get(id);
      if (!d) return;
      _editId = id;
      _ensureEditorInit();

      const formWrap  = document.getElementById(FORM_WRAP_ID);
      const toggleBtn = document.getElementById("design-toggle-form-btn");
      if (formWrap)  formWrap.style.display  = "block";
      if (toggleBtn) toggleBtn.style.display = "none";
      document.getElementById("design-form-heading").textContent = "Edit design project";
      document.getElementById("design-submit-btn").textContent   = "Update project";

      document.getElementById("design-tag-input").value = d.tag         || "";
      document.getElementById("design-title").value     = d.title       || "";
      document.getElementById("design-desc").value      = d.description || "";

      if (_dsQuill)     _dsQuill.clipboard.dangerouslyPasteHTML(d.body || "");
      if (_dsThumbZone) _dsThumbZone.setThumbUrl(d.thumbnailUrl || null);

      const linksContainer = document.getElementById("ds-links-container");
      linksContainer.innerHTML = "";
      _resolveLinks(d).forEach(l => _addLinkRow(linksContainer, l.url, l.label));

      formWrap.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function _resetForm() {
      _editId = null;
      document.getElementById(FORM_ID).reset();
      document.getElementById("design-tag-input").value = "";
      if (_dsQuill)      _dsQuill.setContents([]);
      if (_dsThumbZone)  _dsThumbZone.reset();
      if (_dsAttachZone) _dsAttachZone.reset();
      document.getElementById("ds-links-container").innerHTML = "";
      document.getElementById("design-form-heading").textContent = "New design project";
      document.getElementById("design-submit-btn").textContent   = "Add project";
    }

    // ---- Delete ----
    async function _deleteProject(id) {
      if (!confirm("Delete this project?")) return;
      try {
        await deleteDoc(doc(db, "design_projects", id));
        _projects.delete(id);
        _closeModal();
        showToast("Project deleted.", "info");
        await loadDesignProjects();
      } catch (err) { showToast("Delete failed: " + err.message, "error"); }
    }

    // ---- Lazy editor init ----
    function _ensureEditorInit() {
      if (_editorInited) return;
      _editorInited = true;
      try {
        _dsQuill      = initEditor("ds-toolbar", "ds-editor", "design");
        _dsThumbZone  = initThumbnailZone("ds-thumb", "ds-thumb-preview", "design");
        _dsAttachZone = initAttachmentZone("ds-attach-input", "ds-attach-list", "design");
      } catch (e) { console.warn("Design editor init failed:", e); }
    }

    // ---- Auth / setup ----
    initAuth(async (user, role) => {
      _currentRole = role;
      updateNavUI(user, role);
      await initNavVisibility(role);
      if (user) { const el = document.getElementById("drawer-login"); if (el) el.style.display = "none"; }
      if (hasRole(role, "admin")) document.getElementById("design-list-header").style.display = "";
      await loadDesignProjects();
      showStats(role);

      const toggleBtn = document.getElementById("design-toggle-form-btn");
      const formWrap  = document.getElementById(FORM_WRAP_ID);
      const cancelBtn = document.getElementById("design-cancel-btn");

      if (toggleBtn && formWrap) {
        toggleBtn.addEventListener("click", () => {
          const show = formWrap.style.display === "none" || formWrap.style.display === "";
          formWrap.style.display = show ? "block" : "none";
          if (show) { _resetForm(); _ensureEditorInit(); }
        });
      }
      if (cancelBtn) {
        cancelBtn.addEventListener("click", () => {
          _resetForm();
          if (formWrap)  formWrap.style.display  = "none";
          if (toggleBtn) toggleBtn.style.display = "";
        });
      }
      document.getElementById("ds-add-link-btn")?.addEventListener("click", () =>
        _addLinkRow(document.getElementById("ds-links-container"))
      );
    });

    document.getElementById("nav-logout").addEventListener("click", async () => {
      await logout(); showToast("Signed out.", "info");
    });

    // ---- Modal close ----
    document.getElementById("portfolio-modal-close").addEventListener("click", _closeModal);
    document.getElementById("modal-backdrop").addEventListener("click", _closeModal);
    document.addEventListener("keydown", e => { if (e.key === "Escape") _closeModal(); });

    // ---- Form submit (create + update) ----
    document.getElementById(FORM_ID).addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl     = document.getElementById("design-form-error");
      const submitBtn = document.getElementById("design-submit-btn");
      errEl.textContent = ""; errEl.classList.remove("visible");

      if (!auth.currentUser) {
        errEl.textContent = "You must be signed in."; errEl.classList.add("visible"); return;
      }

      const tag         = document.getElementById("design-tag-input").value.trim();
      const title       = document.getElementById("design-title").value.trim();
      const description = document.getElementById("design-desc").value.trim();
      const body        = _dsQuill ? getEditorHTML(_dsQuill) : "";
      const thumbnailUrl = _dsThumbZone?.getThumbUrl() || null;
      const attachments  = _dsAttachZone?.getAttachments() || [];
      const links        = _getLinks();
      const editId       = _editId;

      if (!tag || !title) {
        errEl.textContent = "Tag and title are required."; errEl.classList.add("visible"); return;
      }

      submitBtn.disabled    = true;
      submitBtn.textContent = editId ? "Updating…" : "Adding…";

      const formWrap  = document.getElementById(FORM_WRAP_ID);
      const toggleBtn = document.getElementById("design-toggle-form-btn");

      try {
        const data = { tag, title, description, body: body || null, thumbnailUrl, attachments, links };
        if (editId) {
          await updateDoc(doc(db, "design_projects", editId), data);
          showToast("Project updated.", "success");
        } else {
          await addDoc(collection(db, "design_projects"), {
            ...data, authorUid: auth.currentUser.uid, createdAt: serverTimestamp()
          });
          showToast("Project added.", "success");
        }
        _allTags.add(tag);
        _resetForm();
        if (formWrap)  formWrap.style.display  = "none";
        if (toggleBtn) toggleBtn.style.display = "";
        await loadDesignProjects();
      } catch (err) {
        errEl.textContent = err.message || "Failed."; errEl.classList.add("visible");
      } finally {
        submitBtn.disabled    = false;
        submitBtn.textContent = _editId ? "Update project" : "Add project";
      }
    });

    // ---- Filter ----
    document.getElementById("filter-bar").addEventListener("click", (e) => {
      const btn = e.target.closest("[data-filter]");
      if (!btn) return;
      document.querySelectorAll("#filter-bar [data-filter]").forEach(b => b.classList.remove("active-filter"));
      btn.classList.add("active-filter");
      const filter = btn.dataset.filter;
      document.querySelectorAll(`#${GRID_ID} .card`).forEach(card => {
        card.style.display = (filter === "all" || card.dataset.tags === filter) ? "" : "none";
      });
    });
  </script>
  <style>
    /* Thumbnail as card background with 50% dark overlay */
    .card.has-thumb {
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .card.has-thumb::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      border-radius: inherit;
      z-index: 0;
      pointer-events: none;
    }
    .card.has-thumb > * {
      position: relative;
      z-index: 1;
    }
    .card.has-thumb h3,
    .card.has-thumb p {
      color: #fff;
    }
    .card.has-thumb .card-tag {
      color: rgba(255,255,255,0.85);
    }

    /* Clickable Firestore cards */
    .card.card-clickable { cursor: pointer; }

    /* --- Modal --- */
    .portfolio-modal {
      position: fixed;
      inset: 0;
      z-index: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .portfolio-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      cursor: pointer;
    }
    .portfolio-modal-box {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      max-width: 700px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      z-index: 1;
      display: flex;
      flex-direction: column;
    }
    .portfolio-modal-header {
      position: sticky;
      top: 0;
      background: var(--bg-card);
      z-index: 2;
      display: flex;
      justify-content: flex-end;
      padding: 0.75rem 1rem 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .portfolio-modal-close-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 0.25rem 0.7rem;
      cursor: pointer;
      font-size: 0.82rem;
      line-height: 1.5;
    }
    .portfolio-modal-close-btn:hover { color: var(--text-primary); }
    #portfolio-modal-content { padding: 1.5rem 2rem 2rem; }
    .portfolio-modal-thumb {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 6px;
      display: block;
      margin-bottom: 1.5rem;
    }
    .portfolio-modal-tag {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }
    .portfolio-modal-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 0.75rem; line-height: 1.2; }
    .portfolio-modal-desc  { color: var(--text-muted); margin-bottom: 1rem; font-size: 0.95rem; line-height: 1.6; }
    .portfolio-modal-body-content { margin: 1.25rem 0; font-size: 0.95rem; }
    .portfolio-modal-links { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
    .portfolio-modal-attachments { margin: 1rem 0; }
    .portfolio-modal-actions {
      display: flex; gap: 0.5rem;
      margin-top: 1.5rem; padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    /* Form link rows */
    .link-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
    .link-row input { padding: 0.4rem 0.6rem; background: var(--input-bg, var(--bg-card)); border: 1px solid var(--border); border-radius: 4px; color: var(--text-primary); font-size: 0.9rem; }
    .link-row .link-url { flex: 2; }
    .link-row .link-label { flex: 1; }

    .active-filter { background: var(--accent-light) !important; color: var(--text-primary) !important; border-color: var(--text-muted) !important; }
  </style>
</body>
