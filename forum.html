<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WINNers · WINN Platforms</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
</head>
<body>
  <div class="top-right-bar">
    <div class="top-right-user">
      <div class="nav-user" id="nav-user" style="display:none"></div>
      <a href="login.html" class="btn btn-primary btn-sm" id="nav-login">Sign In</a>
      <button class="btn btn-ghost btn-sm" id="nav-logout" style="display:none">Sign Out</button>
    </div>
    <div class="top-right-controls">
      <div class="controls-group">
        <span class="controls-group-label">Theme</span>
        <div class="controls-theme">
          <button type="button" id="theme-light">Light</button>
          <button type="button" id="theme-dark">Dark</button>
        </div>
      </div>
      <div class="controls-group">
        <span class="controls-group-label">Font</span>
        <div class="controls-font">
          <button type="button" class="font-option" data-font="inter" aria-label="Inter">Aa</button>
          <button type="button" class="font-option" data-font="georgia" aria-label="Georgia">Aa</button>
          <button type="button" class="font-option" data-font="system" aria-label="System">Aa</button>
        </div>
      </div>
      <div class="controls-group">
        <span class="controls-group-label">Font Size</span>
        <div class="controls-font-size">
          <button type="button" class="font-size-option" data-size="s">S</button>
          <button type="button" class="font-size-option" data-size="m">M</button>
          <button type="button" class="font-size-option" data-size="l">L</button>
        </div>
      </div>
    </div>
  </div>

  <div class="app-layout">
    <aside class="nav-sidebar">
      <a href="index.html" class="nav-brand">WINN<span> Platforms</span></a>
      <div class="nav-links">
        <a href="index.html">About</a>
        <a href="portfolio-software.html">Software</a>
        <a href="portfolio-design.html">Design</a>
        <a href="forum.html" class="active">WINNers</a>
        <a href="blog.html">Writing</a>
        <a href="news.html">News</a>
      </div>
    </aside>
    <main class="main-content">
  <div class="page-wrapper">
    <div class="page-title-bar">
      <div class="container">
        <h1>WINNers</h1>
        <p>Community discussions — threaded by topic</p>
      </div>
    </div>

    <div class="section-sm container-sm">
      <div id="list-view">

        <!-- Auth gate (guests) -->
        <div id="post-gate"></div>

        <!-- List header -->
        <div class="list-header" id="list-header" style="display:none">
          <span id="post-count" class="list-header-count"></span>
          <button class="btn btn-ghost btn-sm" id="toggle-form-btn">+ New Post</button>
        </div>

        <!-- New post form (collapsed by default) -->
        <div id="new-post-form" class="post-form" style="display:none">
          <form id="forum-form">
            <div class="form-group">
              <label for="post-title">Title</label>
              <input type="text" id="post-title" name="title" placeholder="What's your topic?" required />
            </div>

            <div class="form-group">
              <label for="post-thread">Thread / Tag <span style="color:var(--text-muted)">(optional)</span></label>
              <input type="text" id="post-thread" name="thread" placeholder="e.g. general, dev, design" />
            </div>

            <div class="form-group">
              <label>Body</label>
              <div class="editor-wrapper">
                <div id="forum-toolbar">
                  <span class="ql-formats">
                    <select class="ql-font">
                      <option selected>Inter</option>
                      <option value="georgia">Georgia</option>
                      <option value="courier">Courier</option>
                    </select>
                  </span>
                  <span class="ql-formats">
                    <select class="ql-size">
                      <option value="12px">12</option>
                      <option value="14px">14</option>
                      <option selected>16</option>
                      <option value="18px">18</option>
                      <option value="20px">20</option>
                      <option value="24px">24</option>
                      <option value="32px">32</option>
                      <option value="48px">48</option>
                    </select>
                  </span>
                  <span class="ql-formats">
                    <select class="ql-header">
                      <option value="1">H1</option>
                      <option value="2">H2</option>
                      <option value="3">H3</option>
                      <option selected>Body</option>
                    </select>
                  </span>
                  <span class="ql-formats">
                    <button class="ql-bold"></button>
                    <button class="ql-italic"></button>
                    <button class="ql-underline"></button>
                    <button class="ql-strike"></button>
                  </span>
                  <span class="ql-formats">
                    <select class="ql-color"></select>
                    <select class="ql-background"></select>
                  </span>
                  <span class="ql-formats">
                    <select class="ql-align"></select>
                  </span>
                  <span class="ql-formats">
                    <button class="ql-list" value="ordered"></button>
                    <button class="ql-list" value="bullet"></button>
                  </span>
                  <span class="ql-formats">
                    <button class="ql-blockquote"></button>
                    <button class="ql-code-block"></button>
                  </span>
                  <span class="ql-formats">
                    <button class="ql-link"></button>
                    <button class="ql-image" title="Insert Image"></button>
                    <button class="ql-video" title="Insert Video"></button>
                    <button class="ql-audio" title="Insert Audio">♪</button>
                  </span>
                  <span class="ql-formats">
                    <button class="ql-clean"></button>
                  </span>
                </div>
                <div id="forum-editor" class="editor-content"></div>
              </div>
            </div>

            <!-- Thumbnail -->
            <div class="form-group">
              <label>Thumbnail <span style="color:var(--text-muted)">(optional, max 10 MB)</span></label>
              <label class="file-input-label">
                Upload thumbnail
                <input type="file" id="forum-thumb" accept="image/*" />
              </label>
              <div id="forum-thumb-preview"></div>
            </div>

            <!-- File attachments -->
            <div class="form-group">
              <label>Attachments <span style="color:var(--text-muted)">(any type, max 25 MB each)</span></label>
              <label class="file-input-label">
                Add files
                <input type="file" id="forum-attach-input" multiple />
              </label>
              <div id="forum-attach-list" class="attach-list"></div>
            </div>

            <p class="form-error" id="forum-form-error"></p>
            <div style="display:flex;gap:.5rem;align-items:center">
              <button type="submit" class="btn btn-primary btn-sm">Post</button>
              <button type="button" class="btn btn-ghost btn-sm" id="forum-preview-btn">Preview</button>
              <button type="button" class="btn btn-ghost btn-sm" id="forum-cancel-btn">Cancel</button>
            </div>
          </form>
          <div id="forum-preview-panel" class="preview-panel" style="display:none"></div>
        </div>

        <!-- Post rows -->
        <div id="posts-rows">
          <div class="spinner"><div class="spinner-ring"></div></div>
        </div>

      </div><!-- /#list-view -->

      <div id="detail-view" style="display:none"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="container"><p>© 2026 WINN Platforms</p></div>
  </footer>

  <script type="module">
    import { initAuth, updateNavUI, logout, hasRole, showToast } from "./js/auth.js?v=2";
    import { initLayoutControls } from "./js/layout-controls.js";
    import { initForumPage, submitForumPost } from "./js/forum.js";

    initLayoutControls();

    document.getElementById("nav-logout").addEventListener("click", async () => {
      await logout();
      showToast("Signed out.", "info");
      window.location.reload();
    });

    initAuth(async (user, role) => {
      updateNavUI(user, role);
      if (user) { const el = document.getElementById("drawer-login"); if (el) el.style.display = "none"; }

      const gate      = document.getElementById("post-gate");
      const toggleBtn = document.getElementById("toggle-form-btn");

      if (!hasRole(role, "regular")) {
        gate.innerHTML = `
          <div class="access-gate">
            <h3>Sign in to post</h3>
            <p>You need a registered account to post. All visitors can read.</p>
            <a href="login.html" class="btn btn-primary btn-sm">Sign In / Register</a>
          </div>`;
        if (toggleBtn) toggleBtn.style.display = "none";
      }

      await initForumPage();
    });

    document.getElementById("forum-form").addEventListener("submit", async e => {
      e.preventDefault();
      await submitForumPost();
    });
  </script>
</body>
</html>
