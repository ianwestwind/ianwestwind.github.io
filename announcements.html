<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announcements · WINN Platforms</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app-layout">
    <aside class="nav-sidebar">
      <a href="index.html" class="nav-brand">WINN<span> Platforms</span></a>
      <div class="nav-links">
        <a href="index.html">About</a>
        <a href="portfolio-software.html">Software</a>
        <a href="portfolio-design.html">Design</a>
        <a href="forum.html">WINNers</a>
        <a href="writing.html">Writing</a>
        <a href="news.html" class="active">News</a>
      </div>
    </aside>
    <main class="main-content">
  <div class="page-wrapper">
    <div class="page-title-bar">
      <div class="container">
        <h1>Announcements</h1>
        <p>Official updates from the WINN Platforms team</p>
      </div>
    </div>

    <div class="section-sm container">

      <!-- List view -->
      <div id="list-view">

        <!-- Post form (moderator/admin only, shown by JS) -->
        <div id="ann-post-form" class="post-form" style="display:none">
          <h3>New Announcement</h3>
          <form id="ann-form">
            <div class="form-group">
              <label for="ann-title">Title</label>
              <input type="text" id="ann-title" name="title" placeholder="Announcement title" required />
            </div>
            <div class="form-group">
              <label for="ann-body">Body</label>
              <textarea id="ann-body" name="body" placeholder="Write the announcement…" required></textarea>
            </div>
            <p class="form-error" id="ann-form-error"></p>
            <button type="submit" class="btn btn-primary btn-sm">Post Announcement</button>
          </form>
        </div>

        <!-- Announcement rows -->
        <div id="announcements-rows">
          <div class="spinner"><div class="spinner-ring"></div></div>
        </div>

      </div><!-- /#list-view -->

      <!-- Detail view (rendered by JS) -->
      <div id="detail-view" style="display:none"></div>

    </div>
  </div>

  </main>
  <aside class="sidebar-user">
    <div class="nav-user" id="nav-user" style="display:none"></div>
    <a href="login.html" class="btn btn-primary btn-sm" id="nav-login">Sign In</a>
    <button class="btn btn-ghost btn-sm" id="nav-logout" style="display:none">Sign Out</button>
  </aside>
  <aside class="sidebar-controls">
    <div class="controls-group">
      <span class="controls-group-label">Theme</span>
      <div class="controls-theme">
        <button type="button" id="theme-light">Light</button>
        <button type="button" id="theme-dark">Dark</button>
      </div>
    </div>
    <div class="controls-group">
      <span class="controls-group-label">Font</span>
      <div class="controls-font">
        <button type="button" class="font-option" data-font="inter" aria-label="Inter">Aa</button>
        <button type="button" class="font-option" data-font="georgia" aria-label="Georgia">Aa</button>
        <button type="button" class="font-option" data-font="system" aria-label="System">Aa</button>
      </div>
    </div>
    <div class="controls-group">
      <span class="controls-group-label">Size</span>
      <div class="controls-font-size">
        <button type="button" class="font-size-option" data-size="s">S</button>
        <button type="button" class="font-size-option" data-size="m">M</button>
        <button type="button" class="font-size-option" data-size="l">L</button>
      </div>
    </div>
  </aside>
  </div>

  <footer class="footer">
    <div class="container">
      <p>© 2026 WINN Platforms</p>
    </div>
  </footer>

  <script type="module">
    import { initAuth, updateNavUI, logout, hasRole, showToast } from "./js/auth.js?v=3";
    import { initLayoutControls } from "./js/layout-controls.js";
    import { initAnnouncementsPage, submitAnnouncement } from "./js/announcements.js";

    initLayoutControls();

    document.getElementById("nav-logout").addEventListener("click", async () => {
      await logout();
      showToast("Signed out.", "info");
      window.location.reload();
    });

    initAuth(async (user, role) => {
      updateNavUI(user, role);
      if (user) { const el = document.getElementById("drawer-login"); if (el) el.style.display = "none"; }

      if (hasRole(role, "moderator")) {
        document.getElementById("ann-post-form").style.display = "";
      }

      await initAnnouncementsPage();
    });

    document.getElementById("ann-form").addEventListener("submit", async e => {
      e.preventDefault();
      await submitAnnouncement("ann-form");
    });
  </script>
</body>
</html>
