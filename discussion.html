<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discussion · WINN Platforms</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-brand">WINN<span> Platforms</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="portfolio-software.html">Software</a>
      <a href="portfolio-design.html">Design</a>
      <a href="forum.html">Forum</a>
      <a href="discussion.html" class="active">Discussion</a>
      <a href="announcements.html">Announcements</a>
    </div>
    <div class="nav-right">
      <div class="nav-user" id="nav-user" style="display:none"></div>
      <a href="login.html" class="btn btn-primary btn-sm" id="nav-login">Sign In</a>
      <button class="btn btn-ghost btn-sm" id="nav-logout" style="display:none">Sign Out</button>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
    </div>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="nav-drawer" id="nav-drawer">
    <a href="index.html">Home</a>
    <a href="portfolio-software.html">Software Portfolio</a>
    <a href="portfolio-design.html">Design Portfolio</a>
    <a href="forum.html">Forum</a>
    <a href="discussion.html">Discussion</a>
    <a href="announcements.html">Announcements</a>
    <a href="login.html" id="drawer-login">Sign In</a>
  </div>

  <div class="page-wrapper">
    <div class="page-title-bar">
      <div class="container">
        <h1>Discussion</h1>
        <p>General community discussions</p>
      </div>
    </div>

    <div class="section-sm container-sm">

      <div id="post-gate"></div>

      <div class="post-form" id="new-post-form" style="display:none">
        <h3>Start a Discussion</h3>
        <form id="discussion-form">
          <div class="form-group">
            <label for="disc-title">Title</label>
            <input type="text" id="disc-title" name="title" placeholder="What's on your mind?" required />
          </div>
          <div class="form-group">
            <label for="disc-body">Body</label>
            <textarea id="disc-body" name="body" placeholder="Write your post here…" required></textarea>
          </div>
          <p class="form-error" id="disc-form-error"></p>
          <button type="submit" class="btn btn-primary">Post</button>
        </form>
      </div>

      <div id="discussion-posts">
        <div class="spinner"><div class="spinner-ring"></div></div>
      </div>

    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>© 2026 WINN Platforms</p>
    </div>
  </footer>

  <script type="module">
    import { initAuth, updateNavUI, logout, hasRole, showToast } from "./js/auth.js";
    import { loadDiscussionPosts, submitDiscussionPost } from "./js/discussion.js";

    const themeBtn   = document.getElementById("theme-toggle");
    const savedTheme = localStorage.getItem("winn-theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
    themeBtn.textContent = savedTheme === "dark" ? "☀️" : "🌙";
    themeBtn.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      const next    = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("winn-theme", next);
      themeBtn.textContent = next === "dark" ? "☀️" : "🌙";
    });

    document.getElementById("nav-hamburger").addEventListener("click", () =>
      document.getElementById("nav-drawer").classList.toggle("open"));

    document.getElementById("nav-logout").addEventListener("click", async () => {
      await logout();
      showToast("Signed out.", "info");
      window.location.reload();
    });

    initAuth(async (user, role) => {
      updateNavUI(user, role);
      if (user) { const el = document.getElementById("drawer-login"); if (el) el.style.display = "none"; }

      const gate     = document.getElementById("post-gate");
      const postForm = document.getElementById("new-post-form");

      if (hasRole(role, "regular")) {
        postForm.style.display = "";
      } else {
        gate.innerHTML = `
          <div class="access-gate">
            <div class="gate-icon">🔒</div>
            <h3>Sign in to participate</h3>
            <p>Register or log in to join the discussion.</p>
            <a href="login.html" class="btn btn-primary">Sign In / Register</a>
          </div>
        `;
      }

      await loadDiscussionPosts("discussion-posts");
    });

    document.getElementById("discussion-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      await submitDiscussionPost("discussion-form", "discussion-posts");
    });
  </script>
</body>
</html>
