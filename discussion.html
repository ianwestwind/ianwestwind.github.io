<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discussion · WINN Platforms</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app-layout">
    <aside class="nav-sidebar">
      <a href="index.html" class="nav-brand">WINN<span> Platforms</span></a>
      <div class="nav-links">
        <a href="index.html">About</a>
        <a href="portfolio-software.html">Software</a>
        <a href="portfolio-design.html">Design</a>
        <a href="forum.html">WINNers</a>
        <a href="writing.html" class="active">Writing</a>
        <a href="news.html">News</a>
        <div class="nav-dropdown" data-nav-key="teaching">
          <button class="nav-dropdown-btn" onclick="this.closest('.nav-dropdown').classList.toggle('open')">Teaching <span class="nav-dropdown-chevron">▾</span></button>
          <div class="nav-dropdown-menu">
            <a href="teaching.html">Bayesian Thinking</a>
            <a href="#">Intro to Python</a>
          </div>
        </div>
        <a href="consultation.html">Consultation</a>
      </div>
    </aside>
    <main class="main-content">
  <div class="page-wrapper">
    <div class="page-title-bar">
      <div class="container">
        <h1>Discussion</h1>
        <p>General community discussions</p>
      </div>
    </div>

    <div class="section-sm container">

      <!-- List view -->
      <div id="list-view">

        <!-- Auth gate (guests) -->
        <div id="post-gate"></div>

        <!-- List header: count + new post toggle -->
        <div class="list-header" id="list-header" style="display:none">
          <span id="post-count" class="list-header-count"></span>
          <button class="btn btn-ghost btn-sm" id="toggle-form-btn">+ New Post</button>
        </div>

        <!-- New post form (collapsed by default) -->
        <div id="new-post-form" class="post-form" style="display:none">
          <form id="discussion-form">
            <div class="form-group">
              <label for="disc-title">Title</label>
              <input type="text" id="disc-title" name="title" placeholder="What's on your mind?" required />
            </div>
            <div class="form-group">
              <label for="disc-body">Body</label>
              <textarea id="disc-body" name="body" placeholder="Write your post here…" required></textarea>
            </div>
            <div class="form-group">
              <label class="file-input-label">
                Attach image (optional)
                <input type="file" id="post-image" name="image" accept="image/*" />
              </label>
              <div id="image-preview-container"></div>
            </div>
            <p class="form-error" id="disc-form-error"></p>
            <button type="submit" class="btn btn-primary btn-sm">Post</button>
          </form>
        </div>

        <!-- Post rows -->
        <div id="posts-rows">
          <div class="spinner"><div class="spinner-ring"></div></div>
        </div>

      </div><!-- /#list-view -->

      <!-- Detail view (rendered by JS) -->
      <div id="detail-view" style="display:none"></div>

    </div>
  </div>

  </main>
  <aside class="sidebar-user">
    <div class="nav-user" id="nav-user" style="display:none"></div>
    <a href="login.html" class="btn btn-primary btn-sm" id="nav-login">Sign In</a>
    <button class="btn btn-ghost btn-sm" id="nav-logout" style="display:none">Sign Out</button>
  </aside>
  <aside class="sidebar-controls">
    <div class="controls-group">
      <span class="controls-group-label">Theme</span>
      <div class="controls-theme">
        <button type="button" id="theme-light">Light</button>
        <button type="button" id="theme-dark">Dark</button>
      </div>
    </div>
    <div class="controls-group">
      <span class="controls-group-label">Font</span>
      <div class="controls-font">
        <button type="button" class="font-option" data-font="inter" aria-label="Inter">Aa</button>
        <button type="button" class="font-option" data-font="georgia" aria-label="Georgia">Aa</button>
        <button type="button" class="font-option" data-font="system" aria-label="System">Aa</button>
      </div>
    </div>
    <div class="controls-group">
      <span class="controls-group-label">Size</span>
      <div class="controls-font-size">
        <button type="button" class="font-size-option" data-size="s">S</button>
        <button type="button" class="font-size-option" data-size="m">M</button>
        <button type="button" class="font-size-option" data-size="l">L</button>
      </div>
    </div>
  </aside>
  </div>

  <footer class="footer">
    <div class="container">
      <p>© 2026 WINN Platforms</p>
    </div>
  </footer>

  <script type="module">
    import { initAuth, updateNavUI, logout, hasRole, showToast } from "./js/auth.js?v=3";
    import { initLayoutControls } from "./js/layout-controls.js";
    import { initDiscussionPage, submitDiscussionPost } from "./js/discussion.js";
    import { logVisit, showStats } from "./js/analytics.js";
    import { initNavVisibility } from "./js/nav-visibility.js";

    initLayoutControls();
    logVisit("discussion");

    document.getElementById("nav-logout").addEventListener("click", async () => {
      await logout();
      showToast("Signed out.", "info");
      window.location.reload();
    });

    initAuth(async (user, role) => {
      updateNavUI(user, role);
      await initNavVisibility(role);
      if (user) { const el = document.getElementById("drawer-login"); if (el) el.style.display = "none"; }

      const gate      = document.getElementById("post-gate");
      const toggleBtn = document.getElementById("toggle-form-btn");

      if (!hasRole(role, "regular")) {
        gate.innerHTML = `
          <div class="access-gate">
            <h3>Sign in to participate</h3>
            <p>Register or log in to join the discussion.</p>
            <a href="login.html" class="btn btn-primary btn-sm">Sign In / Register</a>
          </div>
        `;
        if (toggleBtn) toggleBtn.style.display = "none";
      }

      await initDiscussionPage();
      showStats(role);
    });

    document.getElementById("discussion-form").addEventListener("submit", async e => {
      e.preventDefault();
      await submitDiscussionPost("discussion-form");
    });
  </script>
</body>
</html>
